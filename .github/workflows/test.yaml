name: Test

on: [push]

env:
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

# SNRC fork: the upstream Playwright E2E suites (stateless / stateful-sepolia /
# stateful-mainnet) were removed from CI. They spin up the full ens-test-env
# Docker stack (flaky Docker Hub pulls in CI), require secrets the fork doesn't
# hold (SECRET_WORDS) and Cloudflare `wrangler`, and exercise upstream `.eth`
# flows the fork has intentionally diverged from. CI keeps the unit tests
# (coverage) and the cross-chain build checks below. Re-add a SNRC-specific E2E
# suite here if/when one exists.

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Get contract addresses
        run: 'parallel --lb --halt now,success=1,fail=1 ::: \
          "pnpm tenv start --no-ensnode --no-scripts --no-build --exit-after-deploy --verbosity 1" \
          "pnpm wait-on ./.env.local"'

      - run: pnpm test:coverage

  build-stateless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Get contract addresses
        run: 'parallel --lb --halt now,success=1,fail=1 ::: \
          "pnpm tenv start --no-ensnode --no-scripts --no-build --exit-after-deploy --verbosity 1" \
          "pnpm wait-on ./.env.local"'

      - name: Build stateless and export
        run: pnpm build:glocal && pnpm export

  build-stateful-sepolia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build stateful sepolia and export
        run: |
          export NEXT_PUBLIC_CHAIN_NAME=sepolia
          pnpm build && pnpm export

  build-stateful-mainnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build stateful mainnet and export
        run: |
          export NEXT_PUBLIC_CHAIN_NAME=mainnet
          pnpm build && pnpm export
