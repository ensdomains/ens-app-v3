name: Knip

on: [push]

jobs:
  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install corepack
        run: npm i -g corepack

      - name: Install pnpm
        run: npm i -g --force corepack && corepack enable pnpm

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Knip's report is informational on the simplex fork. Upstream's
      # tree carries ~100 unused files/exports the fork has no need to
      # clean up; gating CI on a clean knip report would force us to
      # either delete upstream code (raising fork-vs-upstream diff) or
      # to maintain an ever-growing ignore list. `--no-exit-code` keeps
      # the findings visible in the run log without breaking the pipeline.
      - run: pnpm knip --no-exit-code
